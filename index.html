<!DOCTYPE html>
<html>
<head>
  <title>FPS City Multiplayer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body { margin:0; overflow:hidden; touch-action:none; font-family:Arial; }

    canvas { display:block; }

    #crosshair{
      position:absolute;
      left:50%;
      top:50%;
      width:8px;
      height:8px;
      background:white;
      border-radius:50%;
      transform:translate(-50%,-50%);
      z-index:10;
    }

    #fire{
      position:absolute;
      right:20px;
      bottom:60px;
      width:80px;
      height:80px;
      background:red;
      border-radius:50%;
      color:white;
      text-align:center;
      line-height:80px;
      user-select:none;
      z-index:10;
    }

    #joy{
      position:absolute;
      left:20px;
      bottom:40px;
      width:120px;
      height:120px;
      background:rgba(255,255,255,0.1);
      border-radius:50%;
      z-index:10;
    }

    #stick{
      position:absolute;
      left:40px;
      top:40px;
      width:40px;
      height:40px;
      background:white;
      border-radius:50%;
    }

    #offline{
      position:fixed;
      width:100%;
      height:100%;
      background:black;
      color:white;
      display:none;
      justify-content:center;
      align-items:center;
      font-size:24px;
      z-index:999;
    }

    #weapons{
      position:absolute;
      top:10px;
      left:10px;
      z-index:10;
    }

    button{
      margin:4px;
      padding:6px;
    }
  </style>
</head>
<body>

<div id="offline">No Internet Connection</div>
<div id="crosshair"></div>
<div id="fire">FIRE</div>

<div id="joy"><div id="stick"></div></div>

<div id="weapons">
  <button onclick="setWeapon('ak')">AK</button>
  <button onclick="setWeapon('sniper')">Sniper</button>
  <button onclick="setWeapon('shotgun')">Shotgun</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const socket = io();

/* ================= OFFLINE ================= */
const offline = document.getElementById("offline");

function netCheck(){
  if(!navigator.onLine){
    offline.style.display="flex";
  } else {
    offline.style.display="none";
  }
}
setInterval(netCheck,1000);

/* ================= SCENE ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

/* ================= CITY ================= */
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(300,1,300),
  new THREE.MeshStandardMaterial({color:0x2b2b2b})
);
ground.position.y=-1;
scene.add(ground);

/* buildings */
function building(x,z,h){
  const b=new THREE.Mesh(
    new THREE.BoxGeometry(10,h,10),
    new THREE.MeshStandardMaterial({color:0x888888})
  );
  b.position.set(x,h/2,z);
  scene.add(b);
}

building(10,10,10);
building(-15,20,15);
building(25,-10,20);
building(-30,-20,25);
building(40,30,18);

/* cars */
function car(x,z){
  const c=new THREE.Mesh(
    new THREE.BoxGeometry(4,1,6),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  c.position.set(x,0.5,z);
  scene.add(c);

  let dir=1;
  setInterval(()=>{
    c.position.x+=dir;
    if(c.position.x>60||c.position.x<-60) dir*=-1;
  },30);
}

car(20,0);
car(-20,15);

/* ================= PLAYER ================= */
function createPlayer(color){
  const g=new THREE.Group();

  const body=new THREE.Mesh(
    new THREE.CapsuleGeometry(0.5,1),
    new THREE.MeshStandardMaterial({color})
  );

  body.position.y=1;
  g.add(body);

  scene.add(g);
  return g;
}

const me=createPlayer(0x0066ff);

/* ================= CAMERA ================= */
camera.position.y=1.7;

/* ================= JOYSTICK ================= */
let joy={x:0,y:0};
let stick=document.getElementById("stick");
let dragging=false;

document.getElementById("joy").addEventListener("touchstart",()=>dragging=true);
document.getElementById("joy").addEventListener("touchend",()=>{
  dragging=false;
  joy={x:0,y:0};
  stick.style.transform="translate(0,0)";
});

document.getElementById("joy").addEventListener("touchmove",(e)=>{
  if(!dragging) return;

  let t=e.touches[0];
  let dx=t.clientX-(innerWidth*0.15);
  let dy=t.clientY-(innerHeight*0.8);

  dx=Math.max(-50,Math.min(50,dx));
  dy=Math.max(-50,Math.min(50,dy));

  joy.x=dx/50;
  joy.y=dy/50;

  stick.style.transform=`translate(${dx}px,${dy}px)`;
});

/* ================= LOOK ================= */
let yaw=0;

document.addEventListener("mousemove",(e)=>{
  yaw-=e.movementX*0.002;
});

/* ================= WEAPONS ================= */
let weapon="ak";

function setWeapon(w){
  weapon=w;
  socket.emit("weapon",w);
}

/* ================= SHOOT ================= */
document.getElementById("fire").onclick=()=>{
  socket.emit("shoot",me.position);
};

/* ================= JUMP ================= */
let velY=0;
let onGround=true;

document.addEventListener("keydown",(e)=>{
  if(e.key===" "&&onGround){
    velY=0.25;
    onGround=false;
  }
});

/* ================= MOVEMENT ================= */
function update(){

  let speed=0.12;

  me.position.x += Math.sin(yaw+Math.PI/2)*joy.x*speed;
  me.position.z += Math.cos(yaw+Math.PI/2)*joy.x*speed;

  me.position.x += Math.sin(yaw)*-joy.y*speed;
  me.position.z += Math.cos(yaw)*-joy.y*speed;

  velY-=0.01;
  me.position.y+=velY;

  if(me.position.y<0){
    me.position.y=0;
    velY=0;
    onGround=true;
  }

  camera.position.set(me.position.x,me.position.y+1.7,me.position.z);
  camera.rotation.y=yaw;

  socket.emit("move",me.position);
}

/* ================= LOOP ================= */
function animate(){
  requestAnimationFrame(animate);

  if(!navigator.onLine) return;

  update();
  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
