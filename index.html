<!DOCTYPE html>
<html>
<head>
  <title>Mobile FPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    body { margin: 0; overflow: hidden; touch-action: none; }

    canvas { display: block; }

    /* crosshair */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    /* fire button */
    #fire {
      position: absolute;
      right: 20px;
      bottom: 60px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: red;
      color: white;
      text-align: center;
      line-height: 80px;
      font-family: Arial;
      user-select: none;
    }

    /* joystick */
    #joy {
      position: absolute;
      left: 20px;
      bottom: 40px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    #stick {
      position: absolute;
      left: 40px;
      top: 40px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
    }

    /* landscape warning */
    #rotate {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="rotate">Rotate your device ↻</div>
<div id="crosshair"></div>
<div id="fire">FIRE</div>

<div id="joy">
  <div id="stick"></div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const socket = io();

/* ================= LANDSCAPE LOCK ================= */
function checkOrientation(){
  const r = document.getElementById("rotate");
  if(window.innerHeight > window.innerWidth){
    r.style.display = "flex";
  } else {
    r.style.display = "none";
  }
}
window.addEventListener("resize", checkOrientation);
checkOrientation();

/* ================= THREE ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* ground */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({ color: 0x3cb043 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

scene.add(new THREE.AmbientLight(0xffffff, 1));

/* ================= PLAYER ================= */
function createPlayer(color){
  const g = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1,1.5,0.5),
    new THREE.MeshStandardMaterial({ color })
  );
  body.position.y = 1;
  g.add(body);

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.4),
    new THREE.MeshStandardMaterial({ color: 0xffccaa })
  );
  head.position.y = 2.1;
  g.add(head);

  return g;
}

const me = createPlayer(0x0066ff);
scene.add(me);

camera.position.y = 1.7;

/* ================= MOBILE JOYSTICK ================= */
let joy = { x:0, y:0 };

const stick = document.getElementById("stick");
const joyBox = document.getElementById("joy");

let dragging = false;

joyBox.addEventListener("touchstart", e => dragging = true);
joyBox.addEventListener("touchend", e => {
  dragging = false;
  joy = { x:0, y:0 };
  stick.style.transform = `translate(0px,0px)`;
});

joyBox.addEventListener("touchmove", e => {
  if(!dragging) return;

  let t = e.touches[0];
  let rect = joyBox.getBoundingClientRect();

  let dx = t.clientX - (rect.left + rect.width/2);
  let dy = t.clientY - (rect.top + rect.height/2);

  let max = 40;
  dx = Math.max(-max, Math.min(max, dx));
  dy = Math.max(-max, Math.min(max, dy));

  joy.x = dx / max;
  joy.y = dy / max;

  stick.style.transform = `translate(${dx}px,${dy}px)`;
});

/* ================= LOOK (drag screen) ================= */
let yaw = 0;

document.addEventListener("touchmove", (e)=>{
  if(e.target.id === "joy" || e.target.id === "stick") return;

  yaw -= e.touches[0].movementX ? e.touches[0].movementX * 0.002 : 0.01;
});

/* fallback mouse */
document.addEventListener("mousemove", (e)=>{
  yaw -= e.movementX * 0.002;
});

/* ================= MOVEMENT ================= */
function updatePlayer(){
  let speed = 0.1;

  let forwardX = Math.sin(yaw);
  let forwardZ = Math.cos(yaw);

  me.position.x += forwardX * -joy.y * speed;
  me.position.z += forwardZ * -joy.y * speed;

  me.position.x += Math.sin(yaw + Math.PI/2) * joy.x * speed;
  me.position.z += Math.cos(yaw + Math.PI/2) * joy.x * speed;

  me.rotation.y = yaw;

  camera.position.set(
    me.position.x,
    me.position.y + 0.7,
    me.position.z
  );

  camera.rotation.y = yaw;

  socket.emit("move", me.position);
}

/* ================= SHOOT ================= */
document.getElementById("fire").addEventListener("touchstart", ()=>{
  socket.emit("shoot", me.position);
});

/* desktop fallback */
document.getElementById("fire").addEventListener("click", ()=>{
  socket.emit("shoot", me.position);
});

/* ================= MULTIPLAYER ================= */
let players = {};

function createRemote(){
  const p = createPlayer(0xff4444);
  scene.add(p);
  return p;
}

socket.on("init", data=>{
  for(let id in data){
    if(id !== socket.id){
      players[id] = createRemote();
    }
  }
});

socket.on("newPlayer", d=>{
  players[d.id] = createRemote();
});

socket.on("move", d=>{
  if(players[d.id]){
    players[d.id].position.set(d.data.x,0,d.data.z);
  }
});

/* ================= LOOP ================= */
function animate(){
  requestAnimationFrame(animate);
  updatePlayer();
  renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
